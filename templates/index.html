<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma TAMA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary:      #2563eb;
      --primary-dark: #1d4ed8;
      --bg:           #f1f5f9;
      --surface:      #ffffff;
      --border:       #e2e8f0;
      --text:         #0f172a;
      --muted:        #64748b;
      --radius:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      z-index: 1000;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--text);
      white-space: nowrap;
    }
    .logo .accent { color: var(--primary); }
    .logo .tagline {
      font-weight: 400;
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: 0;
      margin-left: 6px;
    }

    /* ── Search bar ──────────────────────────────────────── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field {
      position: relative;
    }

    input[type="text"] {
      height: 38px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .875rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }

    #street-input   { width: 230px; }
    #building-input { width: 110px; }

    /* ── Autocomplete dropdown ───────────────────────────── */
    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      min-width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      max-height: 210px;
      overflow-y: auto;
      z-index: 3000;
    }
    .dropdown.open { display: block; }

    .dropdown-item {
      padding: 9px 13px;
      font-size: .875rem;
      color: var(--text);
      cursor: pointer;
      transition: background .1s;
      white-space: nowrap;
    }
    .dropdown-item:hover,
    .dropdown-item.active {
      background: #eff6ff;
      color: var(--primary);
    }

    /* ── Submit button ───────────────────────────────────── */
    .btn-search {
      height: 38px;
      padding: 0 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .btn-search:hover  { background: var(--primary-dark); }
    .btn-search:active { transform: scale(.97); }
    .btn-search:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

    /* ── Map ─────────────────────────────────────────────── */
    #map { flex: 1; }

    /* ── Status strip ────────────────────────────────────── */
    .status-bar {
      height: 28px;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .01em;
    }
    .status-bar .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 7px;
      flex-shrink: 0;
    }
    .status-bar .dot.busy  { background: #f59e0b; }
    .status-bar .dot.error { background: #ef4444; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    Ma <span class="accent">TAMA</span>
    <span class="tagline">empowering renters</span>
  </div>

  <div class="search-bar">
    <div class="field">
      <input id="street-input" type="text" placeholder="Street name…" autocomplete="off" />
      <div id="street-dropdown" class="dropdown"></div>
    </div>

    <div class="field">
      <input id="building-input" type="text" placeholder="Building #" autocomplete="off" />
      <div id="building-dropdown" class="dropdown"></div>
    </div>

    <button id="search-btn" class="btn-search">Search</button>
  </div>
</header>

<div id="map"></div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Ready</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── Map setup (OSM / EPSG:3857 display; geometry served as WGS84 from backend) ──
  const map = L.map("map", { zoomControl: true }).setView([32.0853, 34.7818], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  let activeLayer = null;

  // ── Status helpers ────────────────────────────────────────────────────────
  const dot  = document.getElementById("status-dot");
  const text = document.getElementById("status-text");

  function setStatus(msg, state = "ok") {
    text.textContent = msg;
    dot.className = "dot" + (state === "ok" ? "" : ` ${state}`);
  }

  // ── Generic autocomplete factory ──────────────────────────────────────────
  function makeAutocomplete(inputEl, dropdownEl, fetcher, onPick) {
    let timer;
    let activeIdx = -1;

    function getItems() {
      return Array.from(dropdownEl.querySelectorAll(".dropdown-item"));
    }

    function close() {
      dropdownEl.classList.remove("open");
      dropdownEl.innerHTML = "";
      activeIdx = -1;
    }

    function open(items) {
      if (!items.length) { close(); return; }
      dropdownEl.innerHTML = items
        .map(v => `<div class="dropdown-item" data-value="${esc(v)}">${esc(v)}</div>`)
        .join("");
      dropdownEl.querySelectorAll(".dropdown-item").forEach(el => {
        el.addEventListener("mousedown", e => {
          e.preventDefault();
          pick(el.dataset.value);
        });
      });
      dropdownEl.classList.add("open");
      activeIdx = -1;
    }

    function pick(value) {
      inputEl.value = value;
      close();
      onPick(value);
    }

    inputEl.addEventListener("input", () => {
      clearTimeout(timer);
      const q = inputEl.value.trim();
      if (q.length < 1) { close(); return; }
      timer = setTimeout(() => {
        fetcher(q).then(open).catch(() => close());
      }, 250);
    });

    inputEl.addEventListener("keydown", e => {
      const items = getItems();
      if (e.key === "Escape") { close(); return; }
      if (!items.length) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
      } else if (e.key === "Enter" && activeIdx >= 0) {
        e.preventDefault();
        pick(items[activeIdx].dataset.value);
        return;
      }
      items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
    });

    inputEl.addEventListener("blur", () => setTimeout(close, 150));
    return { close };
  }

  // ── Wire up autocompletes ─────────────────────────────────────────────────
  makeAutocomplete(
    document.getElementById("street-input"),
    document.getElementById("street-dropdown"),
    q => fetch(`/api/autocomplete/streets?q=${enc(q)}`).then(r => r.json()),
    () => { document.getElementById("building-input").focus(); }
  );

  makeAutocomplete(
    document.getElementById("building-input"),
    document.getElementById("building-dropdown"),
    q => {
      const street = document.getElementById("street-input").value.trim();
      return fetch(`/api/autocomplete/buildings?street=${enc(street)}&q=${enc(q)}`).then(r => r.json());
    },
    () => {}
  );

  // Close dropdowns when clicking outside
  document.addEventListener("click", e => {
    if (!e.target.closest(".field")) {
      document.querySelectorAll(".dropdown").forEach(d => {
        d.classList.remove("open");
        d.innerHTML = "";
      });
    }
  });

  // ── Search ────────────────────────────────────────────────────────────────
  const searchBtn = document.getElementById("search-btn");
  searchBtn.addEventListener("click", doSearch);
  document.getElementById("building-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });

  async function doSearch() {
    const street   = document.getElementById("street-input").value.trim();
    const building = document.getElementById("building-input").value.trim();

    if (!street || !building) {
      setStatus("Please enter both a street name and building number.", "error");
      return;
    }

    setStatus("Searching…", "busy");
    searchBtn.disabled = true;

    try {
      const res  = await fetch(`/api/search?street=${enc(street)}&building=${enc(building)}`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(`Address not found — ${street} ${building}`, "error");
        return;
      }

      if (activeLayer) { map.removeLayer(activeLayer); }

      activeLayer = L.geoJSON(data.geometry, {
        // Polygon / MultiPolygon style
        style: {
          color:       "#2563eb",
          weight:      4,
          opacity:     1,
          fillColor:   "#2563eb",
          fillOpacity: 0.18,
        },
        // Point style
        pointToLayer: (_feat, latlng) =>
          L.circleMarker(latlng, {
            radius:      13,
            color:       "#2563eb",
            weight:      4,
            opacity:     1,
            fillColor:   "#2563eb",
            fillOpacity: 0.22,
          }),
      }).addTo(map);

      map.fitBounds(activeLayer.getBounds(), { maxZoom: 18, padding: [60, 60] });
      setStatus(`${data.street}  ${data.building}`, "ok");

    } catch (err) {
      setStatus("Network error — check console.", "error");
      console.error(err);
    } finally {
      searchBtn.disabled = false;
    }
  }

  // ── Tiny helpers ──────────────────────────────────────────────────────────
  function enc(s) { return encodeURIComponent(s); }
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
